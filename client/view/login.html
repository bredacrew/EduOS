<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EduOS - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body>

<div class="login-container">
    <div class="logo">
        <img src="../src/img/logo/Logo-Senza_sfondo.png" alt="EduOS Logo" class="logo-img">
    </div>

    <div id="msg-error" style="display:none; color:#ff6b6b; margin:20px 0; padding:12px; background:rgba(255,107,107,0.15); border-radius:8px;"></div>
    <div id="msg-success" style="display:none; color:#4ecdc4; margin:20px 0; padding:12px; background:rgba(78,205,196,0.15); border-radius:8px;"></div>

    <form action="../../server/controller/auth_controller.php" method="post">
        <input type="hidden" name="action" value="login">

        <div class="form-group">
            <label for="email">Email</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="your.name@domain.com"
                required
                autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                required
                autocomplete="current-password">
        </div>

        <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="extra-links">
        <a href="PasswordDimenticata.html">Password dimenticata?</a><br>
        <a href="register.html">Non hai un account? Registrati</a>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    // Mostra errore
    if (params.get('error')) {
        const el = document.getElementById('msg-error');
        el.textContent = params.get('error');
        el.style.display = 'block';
    }

    // Mostra messaggio success (es. dopo logout)
    if (params.get('msg')) {
        const el = document.getElementById('msg-success');
        el.textContent = params.get('msg');
        el.style.display = 'block';
    }

    // Pre-compila email se passata nell'URL
    if (params.get('email')) {
        document.getElementById('email').value = params.get('email');
    }
</script>

</body>
</html>
